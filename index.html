<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AnnAamrit | भारत की रसोई - Premium Cloud Kitchen & ERP</title>
    <meta name="description" content="AnnAamrit: जहाँ स्वाद भी संस्कार है, और हर निवाला आशीर्वाद है। 100% Pure Veg premium home-style meals in Patna.">
    
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;0,800;1,600&family=Poppins:wght@300;400;500;600;700&family=Noto+Sans+Devanagari:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* --- PREMIUM DESIGN TOKENS --- */
        :root {
            --bg-center: #093b22; --bg-edge: #011208;   
            --gold-primary: #d4b254; --gold-light: #fbe69e;
            --text-cream: #f8f9fa; --accent-orange: #FF8C00;
            --pure-veg-green: #2ecc71; --spiritual-red: #ff1100;
            --glass-bg: rgba(1, 18, 8, 0.85); --transition-speed: 0.4s;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        
        body {
            font-family: 'Poppins', sans-serif; background: radial-gradient(circle at center, var(--bg-center) 0%, var(--bg-edge) 100%);
            background-attachment: fixed; color: var(--text-cream); position: relative; min-height: 100vh; overflow-x: hidden;
        }

        /* --- ZERO-FAIL SPLASH SCREEN (PURE CSS) --- */
        #splash-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-edge);
            z-index: 99999; display: flex; justify-content: center; align-items: center;
            animation: hideSplash 2.5s forwards; /* Auto-hides after 2.5 seconds guaranteed */
        }
        .splash-logo { width: 150px; animation: pulse 1s infinite alternate; filter: drop-shadow(0 0 20px rgba(212, 178, 84, 0.8)); }
        
        @keyframes pulse { 0% { transform: scale(0.95); opacity: 0.8; } 100% { transform: scale(1.05); opacity: 1; } }
        @keyframes hideSplash {
            0% { opacity: 1; visibility: visible; }
            80% { opacity: 1; visibility: visible; }
            100% { opacity: 0; visibility: hidden; pointer-events: none; z-index: -100; }
        }

        /* --- SANATAN TEXTURES & WATERMARKS --- */
        body::before { content: ''; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100"><path fill="%23d4b254" fill-opacity="0.04" d="M50 0c27.614 0 50 22.386 50 50s-22.386 50-50 50S0 77.614 0 50 22.386 0 50 0zm0 15c-19.33 0-35 15.67-35 35s15.67 35 35 35 35-15.67 35-35-15.67-35-35-35zm0 10c13.807 0 25 11.193 25 25s-11.193 25-25 25-25-11.193-25-25 11.193-25 25-25zm0 10c8.284 0 15 6.716 15 15s-6.716 15-15 15-15-6.716-15-15 6.716-15 15-15z"/></svg>'); background-size: 200px; z-index: -3; pointer-events: none; }
        body::after { content: ''; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 60vw; height: 60vh; background-image: url('logo.png'); background-size: contain; background-repeat: no-repeat; background-position: center; opacity: 0.04; z-index: -2; pointer-events: none; }

        .royal-font { font-family: 'Playfair Display', serif; } .hindi-font { font-family: 'Noto Sans Devanagari', sans-serif; }

        /* --- NAVBAR --- */
        .navbar { position: fixed; top: 0; width: 100%; padding: 15px 40px; display: flex; justify-content: space-between; align-items: center; z-index: 1000; transition: var(--transition-speed); border-bottom: 1px solid rgba(212, 178, 84, 0.1); background: rgba(1, 18, 8, 0.8); backdrop-filter: blur(12px); }
        .nav-brand { display: flex; align-items: center; gap: 15px; text-decoration: none; color: var(--gold-primary); font-size: 2.2rem; font-weight: 700; letter-spacing: 1px; }
        .nav-logo-icon { height: 45px; filter: drop-shadow(0 0 5px rgba(212,178,84,0.5)); }
        .nav-right { display: flex; align-items: center; gap: 20px; }
        .nav-links { display: flex; align-items: center; gap: 15px;}
        .nav-links a { color: var(--text-cream); text-decoration: none; font-weight: 500; font-size: 0.95rem; text-transform: uppercase; letter-spacing: 1px; transition: var(--transition-speed); }
        .nav-links a:hover { color: var(--gold-primary); }

        .pure-veg-badge { display: flex; align-items: center; gap: 8px; background: rgba(46, 204, 113, 0.15); border: 1px solid var(--pure-veg-green); color: var(--pure-veg-green); padding: 6px 15px; border-radius: 30px; font-weight: 700; font-size: 0.9rem; box-shadow: 0 0 10px rgba(46, 204, 113, 0.2); }
        .pure-veg-icon { border: 2px solid var(--pure-veg-green); border-radius: 2px; padding: 2px; width: 16px; height: 16px; display: flex; justify-content: center; align-items: center; }
        .pure-veg-icon::after { content: ''; width: 6px; height: 6px; background: var(--pure-veg-green); border-radius: 50%; }

        /* --- HERO --- */
        .hero { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 120px 20px 50px; position: relative; overflow: hidden; }
        .hero-video-bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: -1; opacity: 0.25; }
        .hero-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(to bottom, rgba(1,18,8,0.7) 0%, rgba(1,18,8,1) 100%); z-index: 0; }
        .hero-content { position: relative; z-index: 1; display: flex; flex-direction: column; align-items: center;}
        .hero-top-spiritual { color: var(--spiritual-red); font-size: 1.8rem; margin-bottom: 20px; letter-spacing: 3px; font-weight: 800; text-shadow: 0 0 20px rgba(255, 0, 0, 0.8); }
        .main-logo-icon { height: 160px; margin-bottom: 20px; filter: drop-shadow(0 0 25px rgba(212, 178, 84, 0.6)); }
        .brand-title { color: var(--gold-light); font-size: 6.5rem; font-weight: 800; line-height: 1; margin-bottom: 5px; text-shadow: 2px 4px 15px rgba(0,0,0,0.8); letter-spacing: 2px; }
        .hero-tagline-hindi { font-size: 3.5rem; color: var(--accent-orange); margin-top: 10px; margin-bottom: 10px; text-shadow: 0 0 15px rgba(255, 140, 0, 0.5); font-weight: 700; }
        
        .trust-grid { display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; max-width: 1000px; margin: 0 auto 40px; position: relative; z-index: 1; }
        .trust-card { border: 1px solid rgba(212, 178, 84, 0.5); border-radius: 10px; padding: 15px 25px; display: flex; flex-direction: column; align-items: center; gap: 10px; background: rgba(1, 18, 8, 0.7); min-width: 200px; backdrop-filter: blur(5px); }
        .trust-card i { color: var(--gold-primary); font-size: 2rem; }

        /* --- SECTIONS COMMON --- */
        .section { padding: 80px 20px; max-width: 1200px; margin: 0 auto; position: relative; z-index: 2; }
        .section-header { text-align: center; margin-bottom: 50px; }
        .section-header h2 { color: var(--gold-light); font-size: 3.5rem; border-bottom: 2px solid var(--gold-primary); display: inline-block; padding-bottom: 10px; text-shadow: 0 4px 10px rgba(0,0,0,0.5); }

        /* --- ABOUT US (EXACT HTML FROM USER) --- */
        .about-container { background: var(--glass-bg); border: 1px solid var(--gold-primary); border-radius: 15px; padding: 50px; box-shadow: 0 20px 50px rgba(0,0,0,0.8); backdrop-filter: blur(10px); }
        .about-container h3 { color: var(--accent-orange); margin-top: 40px; font-size: 1.8rem; margin-bottom: 15px; border-bottom: 1px dashed rgba(212, 178, 84, 0.3); padding-bottom: 5px;}
        .about-container p { font-size: 1.1rem; margin-bottom: 15px; line-height: 1.8; color: var(--text-cream); }
        .highlight { font-weight: bold; color: var(--gold-primary); }
        .about-box { background: rgba(0,0,0,0.4); padding: 25px; border-radius: 12px; border: 1px solid rgba(212, 178, 84, 0.3); margin-top: 20px; }
        .about-box ul { padding-left: 20px; color: var(--text-cream); font-size: 1.1rem; }
        .about-box li { margin-bottom: 10px; }
        .about-box b { color: var(--gold-light); }
        .footer-line { text-align: center; margin-top: 50px; font-size: 22px; font-weight: bold; color: var(--gold-primary); border-top: 1px dashed rgba(212,178,84,0.3); padding-top: 30px; }

        /* --- PRICING & MENU --- */
        .pricing-grid, .menu-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 30px; margin-bottom: 60px; }
        .pricing-card, .menu-card { background: rgba(1, 18, 8, 0.9); border: 1px solid var(--gold-primary); border-radius: 15px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.6); transition: var(--transition-speed); }
        .pricing-card { padding: 30px; text-align: center; }
        .pricing-card:hover, .menu-card:hover { transform: translateY(-10px); border-color: var(--accent-orange); }
        .pricing-title { color: var(--gold-light); font-size: 1.8rem; margin-bottom: 10px; font-weight: 700; }
        .pricing-price { color: var(--accent-orange); font-size: 2.5rem; font-weight: 800; margin-bottom: 20px; }
        .pricing-features { list-style: none; padding: 0; margin-bottom: 30px; text-align: left; }
        .pricing-features li { margin-bottom: 12px; font-size: 1rem; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 8px;}
        .pricing-features li i { color: var(--pure-veg-green); margin-right: 10px; }
        
        .menu-image { width: 100%; height: 250px; object-fit: cover; border-bottom: 3px solid var(--gold-primary); }
        .menu-content { padding: 30px; text-align: left; }
        .menu-day { color: var(--gold-light); font-size: 1.8rem; font-weight: 700; margin-bottom: 20px; text-transform: uppercase; text-align: center; border-bottom: 1px dashed rgba(212,178,84,0.3); padding-bottom: 10px; }
        .meal-time { color: var(--accent-orange); font-weight: 700; margin-top: 15px; font-size: 1.1rem; }
        .meal-desc { color: var(--text-cream); font-size: 1rem; margin-top: 5px; line-height: 1.5; }

        /* --- JOINING FORM --- */
        .form-container { background: rgba(1, 18, 8, 0.85); border: 1px solid var(--gold-primary); border-radius: 15px; padding: 50px; box-shadow: 0 20px 50px rgba(0,0,0,0.8); backdrop-filter: blur(10px); max-width: 1000px; margin: 0 auto;}
        .form-section-title { color: var(--accent-orange); font-size: 1.5rem; margin: 30px 0 15px; border-bottom: 1px dashed rgba(212, 178, 84, 0.4); padding-bottom: 5px;}
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; color: var(--gold-light); font-weight: 600; margin-bottom: 5px; }
        .input-group .hindi-label { color: #aaa; font-size: 0.9rem; font-weight: normal; margin-left: 5px; }
        .form-input, .form-select { width: 100%; padding: 12px; background: rgba(0,0,0,0.5); border: 1px solid rgba(212, 178, 84, 0.5); color: white; border-radius: 8px; font-family: 'Poppins', sans-serif; }
        .form-input:focus, .form-select:focus { border-color: var(--accent-orange); outline: none; }
        .radio-group { display: flex; gap: 20px; flex-wrap: wrap; margin-top: 8px; }
        .radio-item { display: flex; align-items: center; gap: 8px; color: var(--text-cream); }
        .terms-box { background: rgba(255,255,255,0.05); padding: 20px; border-radius: 8px; border: 1px solid rgba(212,178,84,0.2); font-size: 0.95rem; line-height: 1.6; height: 250px; overflow-y: auto; margin-bottom: 20px; }
        .terms-box h4 { color: var(--gold-primary); margin-top: 15px; }
        .hindi-terms { font-size: 0.85rem; color: var(--accent-orange); font-style: italic; display: block;}
        .btn-gold { background: linear-gradient(135deg, #d4b254, #fbe69e, #d4b254); color: #021a0e; padding: 15px 40px; border: none; border-radius: 30px; font-size: 1.2rem; font-weight: 700; cursor: pointer; text-transform: uppercase; transition: var(--transition-speed); box-shadow: 0 10px 20px rgba(0,0,0,0.4); width: 100%; display: block; text-align: center;}

        /* --- REVIEWS --- */
        .reviews-grid { display: flex; gap: 30px; flex-wrap: wrap; justify-content: center; width: 100%; }
        .review-card { background: rgba(1, 18, 8, 0.9); border: 1px solid rgba(212, 178, 84, 0.3); border-radius: 15px; padding: 30px; width: 350px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
